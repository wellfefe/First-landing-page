<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>

    <link rel="icon" type="image/png" sizes="32x32" href="./src/images/favicon-32x32.png">

    <link rel="stylesheet" href="./src/css/all.min.css">

    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/variables.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">

</head>

<body>
    <header class="header">
        <div class="header-container">
            <img class="logo" src="./src/images/logo.svg" alt="Huddle Logo">
        </div>
    </header>
    <main class="hero">
        <img class="mockup" src="./src/images/illustration-mockups.svg" alt="Mockup Image">
        <div class="text">
            <h2 class="title">Build The Community Your Fans Will Love</h2>
            <p class="description">Huddle re-imagines the way we build communities. You have a voice, but so does your
                audience. Create connections with your users as you engage in genuine discussions.</p>
            <button class="btn">Register</button>
        </div>
    </main>
    <footer class="footer">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-instagram"></i>
    </footer>
</body>

</html>
